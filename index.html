<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <main>
        <div class="container">
            <div class="painel-top">
                <div id="expr-pergunta">2x2 = ?</div>
                <div id="expr-resposta">0</div>
            </div>
            <div class="painel-middle">
                <div id="timer">00:00</div>
                <div class="status">
                    <div id="acertos">0</div>
                    <div id="derrotas">0</div>
                </div>
            </div>
            <div class="painel-down">
                <div class="numerico">
                    <button onclick="somarTexto(1)">1</button>
                    <button onclick="somarTexto(2)">2</button>
                    <button onclick="somarTexto(3)">3</button>
                    <button onclick="somarTexto(4)">4</button>
                    <button onclick="somarTexto(5)">5</button>
                    <button onclick="somarTexto(6)">6</button>
                    <button onclick="somarTexto(7)">7</button>
                    <button onclick="somarTexto(8)">8</button>
                    <button onclick="somarTexto(9)">9</button>
                    <button onclick="somarTexto(0)">0</button>
                    <button onclick="apagar()">Apagar</button>
                    <button id="enviar" onclick="enviar()">Enviar</button>
                </div>
            </div>
    </main> 
    <script src="index.js"></script>
</body>
</html>
