<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <main>
        <div class="container">
            <div class="painel">
                <span id="expr">2x2=?</span>
            </div>
            <div class="display">
                <div id="entrada">24</div>
                <div id="resultado">04</div>
            </div>
            <div class="numericos">
                <div class="numerico"><button onclick="somarTexto(1)">1</button></div>
                <div class="numerico"><button onclick="somarTexto(2)">2</button></div>
                <div class="numerico"><button onclick="somarTexto(3)">3</button></div>

                <div class="numerico"><button onclick="somarTexto(4)">4</button></div>
                <div class="numerico"><button onclick="somarTexto(5)">5</button></div>
                <div class="numerico"><button onclick="somarTexto(6)">6</button></div>

                <div class="numerico"><button onclick="somarTexto(7)">7</button></div>
                <div class="numerico"><button onclick="somarTexto(8)">8</button></div>
                <div class="numerico"><button onclick="somarTexto(9)">9</button></div>

                <div class="numerico"><button onclick="somarTexto(0)">0</button></div>
                <div class="numerico"><button onclick="apagar()">Apagar</button></div>
                <div class="numerico"><button onclick="enviar()">Enviar</button></div>
            </div>
        </div>
    </main>
    <script src="index.js"></script>
</body>
</html>
